name = "net"
main = "src/index.js"
compatibility_date = "2025-05-15"
workers_dev = true

[vars]
# Optional custom text shown when users tap support.
# SUPPORT_TEXT = "برای پیگیری، شماره پرونده خود را برای پشتیبانی ارسال کنید."

# Recommended secrets:
# wrangler secret put BOT_TOKEN
# wrangler secret put ADMIN_CHAT_ID
# wrangler secret put BOT_OWNER

# Required for the registration form and request status storage.
[[kv_namespaces]]
binding = "BOT_KV"
id = "6208c8245940403e963ffb17bb8e21a5"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
